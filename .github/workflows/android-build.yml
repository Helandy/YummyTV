name: Android Build

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-37"

      - name: Build debug APK
        run: ./gradlew :tvApp:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :tvApp:assembleRelease --stacktrace
